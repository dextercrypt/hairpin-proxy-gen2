global
    log stdout format raw local0 info
    maxconn 4096

defaults
    log     global
    mode    tcp
    option  tcplog
    option  dontlognull
    timeout connect 5s
    timeout client  60s
    timeout server  60s

# ---------------------------------------------------------------------------
# HTTP (port 80)
# ---------------------------------------------------------------------------
frontend fe_http
    bind *:80
    mode tcp
    default_backend be_http

backend be_http
    mode tcp
    server target "${TARGET_SERVER}:80" send-proxy

# ---------------------------------------------------------------------------
# HTTPS (port 443)
# ---------------------------------------------------------------------------
frontend fe_https
    bind *:443
    mode tcp
    default_backend be_https

backend be_https
    mode tcp
    server target "${TARGET_SERVER}:443" send-proxy
